# Decap CMS Configuration
# Generated by DecapBridge

backend:
  name: git-gateway
  repo: rubenmgoncalves/curly-garbanzo
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/67812362-9262-4657-bd50-42f13e3ebee7/pkce
  auth_token_endpoint: /sites/67812362-9262-4657-bd50-42f13e3ebee7/token
  gateway_url: https://gateway.decapbridge.com

  # Commit messages
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS
site_url: https://rubenmgoncalves.github.io

media_folder: static/images
public_folder: /images

collections:
  # Home/Intro Page
  - name: home
    label: Home
    folder: content/home
    create: false
    slug: intro
    fields:
      - { label: Name, name: name, widget: string }
      - { label: Greeting, name: greeting, widget: string, default: "Hello, I'm {name}" }
      - { label: Bio, name: bio, widget: markdown }

  # Social Links
  - name: socials
    label: Socials
    folder: content/socials
    create: false
    slug: index
    fields:
      - { label: Links, name: links, widget: list, fields: [
          { label: Platform, name: platform, widget: string },
          { label: URL, name: url, widget: string },
          { label: Username, name: username, widget: string }
        ] }

  # Contact Info
  - name: contact
    label: Contact
    folder: content/contact
    create: false
    slug: index
    fields:
      - { label: Email, name: email, widget: string }
      - { label: Phone, name: phone, widget: string }
      - { label: Additional Info, name: body, widget: markdown }

  # Courses
  - name: courses
    label: Courses
    folder: content/courses
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: markdown }
      - { label: Start Date, name: start_date, widget: date }
      - { label: End Date, name: end_date, widget: date }
      - { label: Certificate, name: certificate, widget: image, required: false }

  # Workshops
  - name: workshops
    label: Workshops
    folder: content/workshops
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: markdown }
      - { label: Date, name: date, widget: date }
      - { label: Certificate, name: certificate, widget: image, required: false }
